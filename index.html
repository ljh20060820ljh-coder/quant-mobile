<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易移动中枢 V4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; backdrop-filter: blur(10px); }
        select optgroup { background-color: #1e293b; color: #94a3b8; font-weight: bold; }
        select option { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="p-4 antialiased">
    <div class="max-w-md mx-auto space-y-6">
        <div class="text-center space-y-1 mt-4">
            <h1 class="text-2xl font-bold text-blue-400">⚡ 盘口雷达中枢 V4.2</h1>
            <p class="text-sm text-slate-400">全矩阵附加盘 & 波胆精算引擎</p>
        </div>

        <div class="glass-panel p-5 rounded-xl space-y-4 shadow-lg">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">主队预期进球 (ExpG)</label>
                    <input type="number" id="goalA" step="0.01" value="2.00" class="w-full bg-slate-800 text-white border border-slate-600 rounded p-2 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">客队预期进球 (ExpG)</label>
                    <input type="number" id="goalB" step="0.01" value="0.71" class="w-full bg-slate-800 text-white border border-slate-600 rounded p-2 outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-xs text-slate-400 mb-1">目标盘口项目 (与APP同步)</label>
                <select id="marketType" class="w-full bg-slate-800 text-white border border-slate-600 rounded p-2 outline-none text-sm">
                    <optgroup label="⚽ 全场独赢 (1x2)">
                        <option value="1x2_home">全场独赢 - 主队胜</option>
                        <option value="1x2_draw">全场独赢 - 和局 (平)</option>
                        <option value="1x2_away">全场独赢 - 客队胜</option>
                    </optgroup>

                    <optgroup label="⚖️ 全场让球 (Asian Handicap)">
                        <option value="ah_-0.25">全场让球 - 主队 [-0/0.5] (平局输一半)</option>
                        <option value="ah_-0.5">全场让球 - 主队 [-0.5]</option>
                        <option value="ah_-0.75">全场让球 - 主队 [-0.5/1] (赢一球赢一半)</option>
                        <option value="ah_-1">全场让球 - 主队 [-1] (赢一球退本)</option>
                        <option value="ah_-1.25">全场让球 - 主队 [-1/1.5] (赢一球输一半)</option>
                        <option value="ah_-1.5">全场让球 - 主队 [-1.5]</option>
                        <option value="ah_+0.5">全场让球 - 客队 [+0.5] (即主队让负)</option>
                        <option value="ah_+1">全场让球 - 客队 [+1] (输一球退本)</option>
                    </optgroup>

                    <optgroup label="📈 全场大小 (Over/Under)">
                        <option value="ou_2.25_over">全场大小 - [大 2/2.5] (进2球输一半)</option>
                        <option value="ou_2.5_over" selected>全场大小 - [大 2.5]</option>
                        <option value="ou_2.75_over">全场大小 - [大 2.5/3] (进3球赢一半)</option>
                        <option value="ou_3_over">全场大小 - [大 3] (进3球退本)</option>
                        <option value="ou_2.25_under">全场大小 - [小 2/2.5] (进2球赢一半)</option>
                        <option value="ou_2.5_under">全场大小 - [小 2.5]</option>
                        <option value="ou_2.75_under">全场大小 - [小 2.5/3] (进3球输一半)</option>
                    </optgroup>

                    <optgroup label="🎯 全场波胆 (高赔狙击)">
                        <option value="cs_0_0">波胆 - [0-0]</option>
                        <option value="cs_1_0">波胆 - [1-0]</option>
                        <option value="cs_0_1">波胆 - [0-1]</option>
                        <option value="cs_1_1">波胆 - [1-1]</option>
                        <option value="cs_2_0">波胆 - [2-0]</option>
                        <option value="cs_2_1">波胆 - [2-1]</option>
                        <option value="cs_3_0">波胆 - [3-0]</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1">APP 实时赔率 (Odds)</label>
                <input type="number" id="odds" step="0.01" value="1.85" class="w-full bg-slate-800 text-white border border-slate-600 rounded p-2 outline-none text-lg font-bold">
            </div>

            <button onclick="calculateStrategy()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-2">
                执行核算
            </button>
        </div>

        <div id="resultBox" class="hidden glass-panel p-5 rounded-xl space-y-3 shadow-lg">
            <h2 class="text-lg font-semibold border-b border-slate-600 pb-2">🎯 操盘指令报告</h2>
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-400">数学事件概率:</span>
                <span id="winProb" class="font-mono text-lg font-bold text-white">0%</span>
            </div>
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-400">期望值 (EV):</span>
                <span id="evValue" class="font-mono text-lg font-bold">0</span>
            </div>
            <div id="actionAlert" class="mt-4 p-3 rounded-lg text-center font-bold text-sm"></div>
        </div>
    </div>

    <script>
        const fact = n => n <= 1 ? 1 : n * fact(n - 1);
        const poisson = (k, lambda) => (Math.pow(lambda, k) * Math.exp(-lambda)) / fact(k);

        function calculateStrategy() {
            const lambdaA = parseFloat(document.getElementById('goalA').value);
            const lambdaB = parseFloat(document.getElementById('goalB').value);
            const odds = parseFloat(document.getElementById('odds').value);
            const market = document.getElementById('marketType').value;
            
            let winProb = 0, drawProb = 0, halfWinProb = 0, halfLoseProb = 0;

            for(let i=0; i<=7; i++) {
                for(let j=0; j<=7; j++) {
                    let p = poisson(i, lambdaA) * poisson(j, lambdaB);
                    let diff = i - j;
                    let total = i + j;
                    
                    // 独赢逻辑
                    if(market === '1x2_home' && diff > 0) winProb += p;
                    else if(market === '1x2_draw' && diff === 0) winProb += p;
                    else if(market === '1x2_away' && diff < 0) winProb += p;
                    
                    // 让球附加盘逻辑
                    else if(market === 'ah_-0.25') { if(diff > 0) winProb += p; else if(diff === 0) halfLoseProb += p; }
                    else if(market === 'ah_-0.5') { if(diff > 0) winProb += p; }
                    else if(market === 'ah_-0.75') { if(diff > 1) winProb += p; else if(diff === 1) halfWinProb += p; }
                    else if(market === 'ah_-1') { if(diff > 1) winProb += p; else if(diff === 1) drawProb += p; }
                    else if(market === 'ah_-1.25') { if(diff > 1) winProb += p; else if(diff === 1) halfLoseProb += p; }
                    else if(market === 'ah_-1.5') { if(diff > 1) winProb += p; }
                    else if(market === 'ah_+0.5') { if(diff <= 0) winProb += p; }
                    else if(market === 'ah_+1') { if(diff <= -1) winProb += p; else if(diff === 0) drawProb += p; }
                    
                    // 大小球附加盘逻辑
                    else if(market === 'ou_2.25_over') { if(total >= 3) winProb += p; else if(total === 2) halfLoseProb += p; }
                    else if(market === 'ou_2.5_over') { if(total >= 3) winProb += p; }
                    else if(market === 'ou_2.75_over') { if(total >= 4) winProb += p; else if(total === 3) halfWinProb += p; }
                    else if(market === 'ou_3_over') { if(total >= 4) winProb += p; else if(total === 3) drawProb += p; }
                    else if(market === 'ou_2.25_under') { if(total <= 1) winProb += p; else if(total === 2) halfWinProb += p; }
                    else if(market === 'ou_2.5_under') { if(total <= 2) winProb += p; }
                    else if(market === 'ou_2.75_under') { if(total <= 2) winProb += p; else if(total === 3) halfLoseProb += p; }
                    
                    // 波胆逻辑
                    else if(market.startsWith('cs_')) {
                        let parts = market.split('_');
                        if(i === parseInt(parts[1]) && j === parseInt(parts[2])) winProb += p;
                    }
                }
            }

            // 精准 EV 核算体系
            // EV = 全赢收益 + 赢一半收益 + 走水退本 + 输一半退半本 - 总投入
            let ev = (winProb * odds) 
                   + (halfWinProb * (1 + (odds - 1) / 2)) 
                   + (drawProb * 1.0) 
                   + (halfLoseProb * 0.5) 
                   - 1;

            // 为凯利公式计算一个折算的有效胜率
            let effectiveWinProb = winProb + (halfWinProb * 0.5) + (drawProb * 0.5);

            document.getElementById('resultBox').classList.remove('hidden');
            
            // 如果是波胆，显示绝对概率；如果是附加盘，显示全赢概率
            let probText = (winProb * 100).toFixed(2) + '%';
            if(halfWinProb > 0 || drawProb > 0 || halfLoseProb > 0) {
                probText += ` (另含防守概率 ${( (halfWinProb+drawProb+halfLoseProb)*100 ).toFixed(1)}%)`;
            }
            document.getElementById('winProb').innerText = probText;
            
            const evEl = document.getElementById('evValue');
            evEl.innerText = (ev > 0 ? '+' : '') + ev.toFixed(4);
            evEl.className = `font-mono text-lg font-bold ${ev > 0 ? 'text-green-400' : 'text-red-400'}`;

            const alertEl = document.getElementById('actionAlert');
            if(ev <= 0) {
                alertEl.className = "mt-4 p-3 rounded-lg font-bold bg-red-900/50 text-red-300 border border-red-700";
                alertEl.innerHTML = "🚫 负期望陷阱盘<br><span class="font-normal opacity-80">风险与赔率严重倒挂，坚决不碰！</span>";
            } else {
                let b = odds - 1; let q = 1 - effectiveWinProb;
                let kelly = ((b * effectiveWinProb) - q) / b;
                
                if (market.startsWith('cs_')) {
                    // 波胆策略：极小仓位狙击
                    alertEl.className = "mt-4 p-3 rounded-lg font-bold bg-purple-900/50 text-purple-300 border border-purple-700";
                    alertEl.innerHTML = `💸 高赔率彩票单<br><span class="text-xs font-normal text-purple-100 opacity-80 mt-1 block">建议使用极小资金（如 10~20 元）进行娱乐狙击</span>`;
                } else {
                    // 常规策略：半凯利防守
                    let safeKelly = Math.max((kelly / 2) * 100, 0.5); 
                    alertEl.className = "mt-4 p-3 rounded-lg font-bold bg-green-900/50 text-green-300 border border-green-700";
                    alertEl.innerHTML = `✅ 满足建仓条件<br><span class="text-xs font-normal text-green-100 opacity-80 mt-1 block">建议投入闲置本金的 ${safeKelly.toFixed(1)}%</span>`;
                }
            }
        }
    </script>
</body>
</html>
