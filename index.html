<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant-Elite Terminal V9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .gradient-gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-10">

    <div id="inputScreen" class="max-w-md mx-auto p-4 space-y-4">
        <div class="relative h-48 rounded-3xl overflow-hidden shadow-2xl">
            <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=800" class="w-full h-full object-cover opacity-60">
            <div class="absolute bottom-4 left-4">
                <h1 class="text-3xl font-black text-white italic tracking-tighter">ELITE TERMINAL</h1>
                <p class="text-amber-400 font-bold">V9.0 | 战术核算指挥所</p>
            </div>
        </div>

        <div class="glass p-5 rounded-3xl shadow-xl space-y-4">
            <input type="password" id="apiKey" placeholder="🔑 API Key (保存在手机本地)" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm">
            <div class="grid grid-cols-2 gap-2">
                <select id="teamA" class="bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm"></select>
                <select id="teamB" class="bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm"></select>
            </div>
            
            <select id="marketType" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm">
                <optgroup label="全场独赢 (1x2)">
                    <option value="winA">主胜</option><option value="draw">和局</option><option value="winB">客胜</option>
                </optgroup>
                <optgroup label="让球盘 (AH)">
                    <option value="ah_-0.5">让球 [-0.5]</option><option value="ah_-1.0">让球 [-1.0]</option><option value="ah_-1.5">让球 [-1.5]</option>
                </optgroup>
                <optgroup label="大小球 (OU)">
                    <option value="ou_2.5_over">大小 [大 2.5]</option><option value="ou_2.5_under">大小 [小 2.5]</option><option value="ou_3.0_over">大小 [大 3.0]</option>
                </optgroup>
                <optgroup label="波胆 (Correct Score)">
                    <option value="score_1_0">波胆 [1-0, 2-0, 2-1, 3-0]</option>
                    <option value="score_0_1">波胆 [0-1, 0-2, 1-2, 0-3]</option>
                </optgroup>
            </select>
            
            <input type="number" id="odds" placeholder="💰 实时赔率" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 text-lg font-bold">
            <button onclick="runTerminal()" class="w-full gradient-gold p-4 rounded-2xl font-black text-white text-lg shadow-lg">启动核算</button>
        </div>
    </div>

    <div id="resultScreen" class="hidden max-w-md mx-auto p-4 space-y-6">
        <div class="glass p-8 rounded-3xl text-center space-y-4">
            <div class="text-sm uppercase text-slate-400">核算结果</div>
            <div id="output" class="text-5xl font-black italic"></div>
            <div id="verdict" class="text-xl font-bold py-3 rounded-xl uppercase tracking-widest"></div>
            <button onclick="switchScreen('input')" class="w-full border border-slate-700 p-3 rounded-xl mt-4">重新核算</button>
        </div>
    </div>

    <script>
        const RATINGS = {"argentina":1976,"france":2009,"spain":2010,"brazil":1955,"england":1993,"portugal":1945,"netherlands":1894,"germany":1926,"belgium":1878,"italy":1901,"colombia":1878,"uruguay":1831,"croatia":1852,"morocco":1874,"switzerland":1812,"usa":1826,"mexico":1834,"japan":1825,"senegal":1848,"denmark":1795,"ecuador":1829,"australia":1772,"south-korea":1760,"iran":1747,"poland":1731,"canada":1740,"serbia":1714,"wales":1688,"ghana":1659,"tunisia":1680,"ivory-coast":1732,"nigeria":1671,"saudi-arabia":1657,"qatar":1592,"egypt":1695,"algeria":1704,"scotland":1663,"cameroon":1633,"paraguay":1681,"venezuela":1625,"chile":1616,"peru":1612,"czech-republic":1651,"bosnia-and-herzegovina":1602,"south-africa":1591,"new-zealand":1591,"panama":1615,"jamaica":1514,"honduras":1497,"jordan":1548,"haiti":1537,"el-salvador":1438,"trinidad-and-tobago":1429,"guatemala":1416,"norway":1880,"sweden":1752,"turkey":1731,"austria":1718,"iraq":1599,"uzbekistan":1633,"cape-verde":1599,"dr-congo":1650,"curacao":1548};
        const TEAM_NAMES = {"argentina":"阿根廷","france":"法国","spain":"西班牙","brazil":"巴西","england":"英格兰","portugal":"葡萄牙","netherlands":"荷兰","germany":"德国","belgium":"比利时","italy":"意大利","colombia":"哥伦比亚","uruguay":"乌拉圭","croatia":"克罗地亚","morocco":"摩洛哥","switzerland":"瑞士","usa":"美国","mexico":"墨西哥","japan":"日本","senegal":"塞内加尔","denmark":"丹麦","ecuador":"厄瓜多尔","australia":"澳大利亚","south-korea":"韩国","iran":"伊朗","poland":"波兰","canada":"加拿大","serbia":"塞尔维亚","wales":"威尔士","ghana":"加纳","tunisia":"突尼斯","ivory-coast":"科特迪瓦","nigeria":"尼日利亚","saudi-arabia":"沙特阿拉伯","qatar":"卡塔尔","egypt":"埃及","algeria":"阿尔及利亚","scotland":"苏格兰","cameroon":"喀麦隆","paraguay":"巴拉圭","venezuela":"委内瑞拉","chile":"智利","peru":"秘鲁","czech-republic":"捷克","bosnia-and-herzegovina":"波黑","south-africa":"南非","new-zealand":"新西兰","panama":"巴拿马","jamaica":"牙买加","honduras":"洪都拉斯","jordan":"约旦","haiti":"海地","el-salvador":"萨尔瓦多","trinidad-and-tobago":"特立尼达和多巴哥","guatemala":"危地马拉","norway":"挪威","sweden":"瑞典","turkey":"土耳其","austria":"奥地利","iraq":"伊拉克","uzbekistan":"乌兹别克斯坦","cape-verde":"佛得角","dr-congo":"民主刚果","curacao":"库拉索"};

        // 初始化
        document.querySelectorAll('select').forEach(s => { if(s.id !== 'marketType') Object.keys(RATINGS).sort().forEach(t => s.innerHTML += `<option value="${t}">${TEAM_NAMES[t]}</option>`); });
        document.getElementById('apiKey').value = localStorage.getItem('DS_KEY') || '';
        document.getElementById('apiKey').oninput = (e) => localStorage.setItem('DS_KEY', e.target.value);

        function switchScreen(to) {
            document.getElementById('inputScreen').classList.toggle('hidden', to !== 'input');
            document.getElementById('resultScreen').classList.toggle('hidden', to !== 'result');
        }

        async function runTerminal() {
            const key = document.getElementById('apiKey').value;
            const market = document.getElementById('marketType').value;
            const odds = parseFloat(document.getElementById('odds').value);
            const rA = RATINGS[document.getElementById('teamA').value], rB = RATINGS[document.getElementById('teamB').value];
            
            // 核心算法：双变量泊松计算器
            const lambda = 1.35 + ((rA - rB) / 400), mu = 1.35 + ((rB - rA) / 400);
            const fact = n => n <= 1 ? 1 : n * fact(n - 1);
            const pA = (k, l) => (Math.exp(-l) * Math.pow(l, k)) / fact(k);
            
            let winProb = 0, pushProb = 0;
            for (let a = 0; a <= 6; a++) {
                for (let b = 0; b <= 6; b++) {
                    const p = pA(a, lambda) * pA(b, mu);
                    if (market === '1x2_home' && a > b) winProb += p;
                    else if (market === '1x2_draw' && a === b) winProb += p;
                    else if (market === 'ah_-1.0' && a - b > 1) winProb += p;
                    else if (market === 'ah_-1.0' && a - b === 1) pushProb += p;
                    else if (market === 'ou_2.5_over' && a + b > 2.5) winProb += p;
                    else if (market === 'score_1_0' && (a==1&&b==0 || a==2&&b==0 || a==2&&b==1 || a==3&&b==0)) winProb += p;
                }
            }

            // 获取 AI 修正
            const ai = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST", headers: {"Content-Type":"application/json", "Authorization": `Bearer ${key}`},
                body: JSON.stringify({model: "deepseek-chat", messages: [{role: "user", content: "分析比赛情报修正值(-0.1到0.1)，只返回小数"}]})
            }).then(r => r.json()).then(d => parseFloat(d.choices[0].message.content) || 0).catch(() => 0);
            
            const ev = ((winProb + ai) * odds) + (pushProb * 1.0) - 1;
            document.getElementById('output').innerText = ev > 0 ? `+$${(ev*100).toFixed(2)}` : `-$${(Math.abs(ev)*100).toFixed(2)}`;
            document.getElementById('verdict').innerText = ev > 0 ? "✅ 建议建仓" : "🚫 建议避险";
            document.getElementById('verdict').className = ev > 0 ? "text-emerald-400" : "text-rose-400";
            switchScreen('result');
        }
    </script>
</body>
</html>
